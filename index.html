<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子名片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card-container {
            width: 100%;
            max-width: 375px;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.1);
        }
        .header-zone {
            padding: 24px 24px 0 24px;
            position: relative;
        }
        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
        }
        .brand-text {
            flex: 1;
            text-align: left;
            padding-left: 0;
        }
        .brand-text .hd-en {
            font-size: 26px;
            font-weight: 800;
            color: #1a1a1a;
            letter-spacing: 3px;
            line-height: 1.2;
        }
        .brand-text .hd-cn {
            font-size: 13px;
            color: #888;
            letter-spacing: 5px;
            margin-top: 4px;
        }
        .logo-hd {
            width: 120px;
            height: 68px;
            border-radius: 12px;
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            margin-left: -30px;
        }
        .logo-hd img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .accent-line {
            height: 3px;
            background: #E85440;
            margin: 16px 0 0;
            border-radius: 2px;
            width: 50px;
        }
        .card-body {
            padding: 20px 24px 24px;
        }
        .profile-header {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: #f5f5f7;
            border: 2px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: #E85440;
            flex-shrink: 0;
        }
        .profile-info h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .profile-info .title {
            font-size: 12px;
            color: #666;
        }
        .level-tag {
            font-size: 9px;
            color: #E85440;
            background: rgba(232, 84, 64, 0.06);
            padding: 2px 8px;
            border-radius: 5px;
            border: 1px solid rgba(232, 84, 64, 0.12);
            margin-left: 8px;
        }
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .section-divider .line { flex: 1; height: 1px; background: #eee; }
        .section-divider .dot {
            width: 6px; height: 6px; border-radius: 2px;
            background: #E85440; transform: rotate(45deg);
        }
        .contact-list { margin-bottom: 20px; }
        .contact-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid #f5f5f7;
            text-decoration: none; color: inherit;
        }
        .contact-row:last-child { border-bottom: none; }
        .contact-icon-box {
            width: 36px; height: 36px; border-radius: 9px;
            background: #fff5f3; display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0; color: #E85440; border: 1px solid #ffe8e4;
        }
        .contact-detail { flex: 1; min-width: 0; }
        .contact-detail .label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .contact-detail .value { font-size: 13px; color: #333; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .expertise-section { margin-bottom: 20px; }
        .section-title {
            font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        .section-title::before { content: ""; width: 12px; height: 2px; background: #E85440; border-radius: 1px; }
        .tags-grid { display: flex; flex-wrap: wrap; gap: 7px; }
        .tag-item {
            padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: 500;
            background: #f5f5f7; color: #666; border: 1px solid #eee;
        }
        .tag-item.core {
            background: #E85440; color: #ffffff; border-color: #E85440;
            box-shadow: 0 2px 6px rgba(232, 84, 64, 0.15);
        }
        .tag-item.light {
            background: rgba(232, 84, 64, 0.05); color: #E85440;
            border-color: rgba(232, 84, 64, 0.1);
        }
        .bottom-area {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 16px; border-top: 1px solid #f0f0f0; gap: 14px;
        }
        .qr-box {
            width: 64px; height: 64px; border-radius: 12px; background: #f5f5f7;
            border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 1px; font-size: 9px; color: #bbb;
            text-align: center; line-height: 1.3; flex-shrink: 0;
        }
        .slogan-area { flex: 1; text-align: right; }
        .slogan-text { font-size: 10px; color: #999; line-height: 1.5; }
        .slogan-text strong { color: #E85440; font-weight: 600; }
        .social-bar { display: flex; gap: 7px; justify-content: flex-end; margin-top: 8px; }
        .social-btn {
            width: 30px; height: 30px; border-radius: 8px; background: #f5f5f7;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #888; border: 1px solid #eee;
        }
        .bottom-bar { height: 3px; background: #E85440; position: relative; }
        .bottom-bar::before { content: ""; position: absolute; left: 0; top: 0; width: 30%; height: 100%; background: #1a1a1a; opacity: 0.08; }
        @media print {
            body { background: #fff; padding: 0; }
            .card-container { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
